x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/document_intelligence
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET: document-intelligence
  S3_REGION: us-east-1
  API_KEY: dev-local-api-key

x-app-depends-on: &app-depends-on
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio-createbucket:
    condition: service_completed_successfully
  migrate:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: document_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/document-intelligence
      "

  migrate:
    build: .
    environment: *app-env
    entrypoint: ["alembic"]
    command: ["upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on: *app-depends-on

  worker:
    build: .
    restart: unless-stopped
    command: ["arq", "document_intelligence.worker.WorkerSettings"]
    environment:
      <<: *app-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env before starting the stack}
    depends_on: *app-depends-on

volumes:
  postgres-data:
  minio-data:
